# KITTI Depth Completion - R3DC config
# Reproduces the 8-epoch outdoor recipe in Sec. 5.2 of the paper.

dataset:
  name: kitti
  root: /datasets/kitti
  manifest: null              # optional: path to rgb,sparse,gt csv
  d_min: 0.0
  d_max: 80.0
  density: 0.05               # KITTI is structured ~5% Velodyne

input:
  size: [352, 1216]           # H, W

model:
  variant: outdoor
  base_channels: 64
  num_iters: 6                # CSPN++ iterations
  cma_token_limit: 512
  drop_path: 0.10
  use_uncertainty: true
  use_aux: true

loss:
  silog: 1.00
  focal_berhu: 0.60
  ssim: 0.20
  anchor: 0.15
  vnl: 0.10
  dnc: 0.05
  grad: 0.05
  uncertainty: 0.05
  aux: 0.10
  silog_alpha: 0.85
  focal_gamma: 2.0
  berhu_c_ratio: 0.2
  vnl_num_samples: 4096

optim:
  optimizer: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]
  amp: true

scheduler:
  name: cosine_warm_restarts
  T_0: 10
  T_mult: 2
  eta_min: 1.0e-6
  warmup_epochs: 0

training:
  epochs: 8
  batch_size: 4
  num_workers: 4
  ema_decay: 0.9999
  grad_clip: 1.0
  log_every: 50
  ckpt_every: 1
  seed: 42

augment:
  hflip: 0.5
  color_jitter: 0.2
  gamma_lo: 0.8
  gamma_hi: 1.2
  sparse_dropout: 0.3
  sparse_dropout_rate: 0.5
  cutmix: 0.3
  cutmix_lo: 0.3
  cutmix_hi: 0.7
